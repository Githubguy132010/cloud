name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # type(scope): description  OR  type: description
          pattern='^(feat|fix|refactor|docs|test|chore|ci|style|perf)(\([a-zA-Z0-9_-]+\))?: .+'
          if ! echo "$TITLE" | grep -Eq "$pattern"; then
            echo "::error::PR title must match the format: type(scope): description"
            echo "  Allowed types: feat, fix, refactor, docs, test, chore, ci, style, perf"
            echo "  Example: feat(auth): add SSO login"
            exit 1
          fi

          # No trailing period
          if echo "$TITLE" | grep -Eq '\.$'; then
            echo "::error::PR title must not end with a period."
            exit 1
          fi

          # Length check
          length=${#TITLE}
          if [ "$length" -gt 72 ]; then
            echo "::error::PR title must be 72 characters or fewer (currently $length)."
            exit 1
          fi

          echo "PR title is valid: $TITLE"
