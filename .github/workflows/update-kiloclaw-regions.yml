name: Update KiloClaw Regions

on:
  workflow_dispatch:
    inputs:
      regions:
        description: >
          Comma-separated region list. Meta: eu, us. Specific: arn, cdg, iad, ams,
          fra, lhr, lax, ewr, sjc, ord, dfw, yyz. Duplicates OK (biases shuffle).
          Examples: "eu,us" or "dfw,ord,lax" or "dfw,dfw,ord"
        required: true
        type: string

jobs:
  update:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    name: Update KiloClaw Fly Regions

    steps:
      - name: Validate regions
        run: |
          VALID_REGIONS="eu us arn cdg iad ams fra lhr lax ewr sjc ord dfw yyz"
          INPUT="${{ inputs.regions }}"

          if [ -z "$INPUT" ]; then
            echo "::error::Region list cannot be empty"
            exit 1
          fi

          IFS=',' read -ra REGIONS <<< "$INPUT"
          for region in "${REGIONS[@]}"; do
            region=$(echo "$region" | tr -d '[:space:]')
            if [ -z "$region" ]; then
              echo "::error::Empty region in list (double comma?)"
              exit 1
            fi
            if ! echo "$VALID_REGIONS" | grep -qw "$region"; then
              echo "::error::Invalid region: '$region'. Valid regions: $VALID_REGIONS"
              exit 1
            fi
          done

          echo "Validated regions: $INPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Write regions to KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e115e769bcdd4c3d66af59d3332cb394
        run: |
          wrangler kv key put "fly-regions" "${{ inputs.regions }}" \
            --namespace-id 1f406d747ead4a5896b750c1000973e0

      - name: Verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e115e769bcdd4c3d66af59d3332cb394
        run: |
          VALUE=$(wrangler kv key get "fly-regions" --namespace-id 1f406d747ead4a5896b750c1000973e0 --text)
          echo "Current KV value: $VALUE"
          if [ "$VALUE" != "${{ inputs.regions }}" ]; then
            echo "::error::KV value mismatch. Expected '${{ inputs.regions }}', got '$VALUE'"
            exit 1
          fi
          echo "✅ Regions updated successfully"
